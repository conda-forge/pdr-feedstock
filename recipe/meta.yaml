{% set name = "pdr" %}
{% set version = "1.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pdr-{{ version }}.tar.gz
  sha256: b15bb07f2c2f7b0fbc1d5e5a7351834d72074606a419d91484b9d9a1ea2f9baf

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=64
    - pip
  run:
    - astropy-base
    - cytoolz
    - dustgoggles
    - more-itertools
    - multidict
    - numpy
    - pandas >=2.0.0
    - pillow
    - pvl
    - python >={{ python_min }}
    - rms-vax

test:
  imports:
    - pdr
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MillionConcepts/pdr
  summary: A simple library to read all planetary data.
  description: pdr, the Planetary Data Reader, is a tool which provides a single command -- read('/path/to/file') -- for ingesting all common planetary data types.
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - Sierra-MC
    - m-stclair
